<!DOCTYPE html>
<html>
<head>
  <title>Account Settings</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background-color: #f4f6f8;
      margin: 0;
      padding: 20px;
    }

    .settings-container {
      max-width: 500px;
      margin: 40px auto;
      background: #ffffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
    }

    h2 {
      text-align: center;
      color: #333;
      margin-bottom: 30px;
    }

    label {
      font-weight: 500;
      color: #444;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 10px 12px;
      margin-top: 6px;
      margin-bottom: 20px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 16px;
    }

    button {
      width: 100%;
      background-color: #007bff;
      color: white;
      padding: 12px;
      border: none;
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: background-color 0.3s ease;
    }

    button:hover {
      background-color: #0056b3;
    }
  </style>
</head>
<body>
  <div class="settings-container">
    <h2>⚙️ Account Settings</h2>
    <form method="POST">
      <label>Name:</label><br>
      <input type="text" name="name" value="{{ user.name }}"><br>

      <label>Email:</label><br>
      <input type="email" name="email" value="{{ user.email }}"><br>

      <label>New Password:</label><br>
      <input type="password" name="password"><br>

      <button type="submit">💾 Save Changes</button>
    </form>
  </div>
</body>
</html>
